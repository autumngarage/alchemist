# Pre-commit hooks — installed via: pre-commit install --install-hooks
# Docs: https://pre-commit.com
#
# Hooks run at two stages:
#   pre-commit: fast checks on every commit (formatting, secrets, file hygiene)
#   pre-push:   fast branch checks; AI review only runs for default-branch pushes

repos:
  # ── Standard file hygiene ──────────────────────────────────────────────
  # Cortex append-only exclusions: `.cortex/journal/` is append-only and
  # `.cortex/doctrine/` is immutable-with-supersede (see Cortex Protocol §4.1,
  # §4.2). Pre-commit rewriting trailing whitespace or final newlines in
  # those files violates the contract — the entries' content must not change
  # after the original write. Excluding them here keeps the hook useful
  # everywhere else while respecting the protocol.
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v5.0.0
    hooks:
      - id: trailing-whitespace
        exclude: ^\.cortex/(journal|doctrine)/
      - id: end-of-file-fixer
        exclude: ^\.cortex/(journal|doctrine)/
      - id: check-yaml
      - id: check-json
        exclude: tsconfig.*\.json$
      - id: check-added-large-files
        args: ['--maxkb=500']
      - id: detect-private-key
      - id: no-commit-to-branch
        args: ['--branch', 'main', '--branch', 'master']
        stages: [pre-commit]
      - id: check-merge-conflict

  # ── Secret scanning ────────────────────────────────────────────────────
  - repo: https://github.com/gitleaks/gitleaks
    rev: v8.22.1
    hooks:
      - id: gitleaks

  # ── Shell script quality ───────────────────────────────────────────────
  - repo: https://github.com/shellcheck-py/shellcheck-py
    rev: v0.11.0.1
    hooks:
      - id: shellcheck
        args: ['--severity=warning']

  - repo: https://github.com/scop/pre-commit-shfmt
    rev: v3.13.1-1
    hooks:
      - id: shfmt
        # Match Touchstone's 2-space shell style while making case blocks and
        # binary operators deterministic.
        args: ['-i', '2', '-ci', '-bn']
        exclude: ^(completions/|prototypes/)

  - repo: https://github.com/igorshubovych/markdownlint-cli
    rev: v0.46.0
    hooks:
      - id: markdownlint
        args: ['--config', '.markdownlint.json']
        files: ^([^/]+\.md|principles/.*\.md|audits/.*\.md|feedback/.*\.md|templates/.*\.md)$
        exclude: ^\.cortex/

  # ── Branch naming enforcement ──────────────────────────────────────────
  - repo: local
    hooks:
      - id: branch-naming
        name: Branch naming convention
        entry: >-
          /usr/bin/env bash -c 'branch="$(git rev-parse --abbrev-ref HEAD)";
          [[ "$branch" == "main" || "$branch" == "master" || "$branch" =~ ^(feat|fix|chore|refactor|docs)/ ]] ||
          { echo "Branch name must match: feat/, fix/, chore/, refactor/, or docs/"; exit 1; }'
        language: system
        stages: [pre-push]
        always_run: true
        pass_filenames: false

  # ── AI default-branch push review ──────────────────────────────────────
  - repo: local
    hooks:
      - id: codex-review
        name: AI default-branch push review
        entry: /usr/bin/env bash scripts/codex-review.sh
        language: system
        stages: [pre-push]
        always_run: true
        pass_filenames: false

  # ── Project profile checks ─────────────────────────────────────────────
  # scripts/touchstone-run.sh reads .touchstone-config and dispatches to the
  # appropriate Node/TypeScript, Swift, Rust, Python, Go, or monorepo commands.
  - repo: local
    hooks:
      - id: touchstone-validate
        name: Touchstone project validation
        entry: >-
          /usr/bin/env env
          -u GIT_DIR -u GIT_WORK_TREE -u GIT_INDEX_FILE
          -u PRE_COMMIT -u PRE_COMMIT_FROM_REF -u PRE_COMMIT_TO_REF
          -u PRE_COMMIT_LOCAL_BRANCH -u PRE_COMMIT_REMOTE_BRANCH
          -u PRE_COMMIT_REMOTE_NAME -u PRE_COMMIT_REMOTE_URL
          bash scripts/touchstone-run.sh validate
        language: system
        stages: [pre-push]
        always_run: true
        pass_filenames: false
