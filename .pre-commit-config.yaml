# Pre-commit hooks - installed with:
#   pre-commit install --install-hooks
#   pre-commit install --hook-type pre-push

repos:
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v5.0.0
    hooks:
      - id: trailing-whitespace
        exclude: ^\.cortex/(journal|doctrine)/
      - id: end-of-file-fixer
        exclude: ^\.cortex/(journal|doctrine)/
      - id: check-yaml
      - id: check-json
        exclude: tsconfig.*\.json$
      - id: check-added-large-files
        args: ["--maxkb=500"]
      - id: detect-private-key
      - id: no-commit-to-branch
        args: ["--branch", "main", "--branch", "master"]
        stages: [pre-commit]
      - id: check-merge-conflict

  - repo: https://github.com/gitleaks/gitleaks
    rev: v8.22.1
    hooks:
      - id: gitleaks

  - repo: https://github.com/shellcheck-py/shellcheck-py
    rev: v0.11.0.1
    hooks:
      - id: shellcheck
        args: ["--severity=warning"]

  - repo: https://github.com/scop/pre-commit-shfmt
    rev: v3.13.1-1
    hooks:
      - id: shfmt
        args: ["-i", "2", "-ci", "-bn"]

  - repo: https://github.com/igorshubovych/markdownlint-cli
    rev: v0.46.0
    hooks:
      - id: markdownlint
        args: ["--config", ".markdownlint.json"]
        files: ^([^/]+\.md|docs/.*\.md)$
        exclude: ^\.cortex/

  - repo: local
    hooks:
      - id: branch-naming
        name: Branch naming convention
        entry: >-
          /usr/bin/env bash -c 'branch="$(git rev-parse --abbrev-ref HEAD)";
          [[ "$branch" == "main" || "$branch" == "master" || "$branch" =~ ^(feat|fix|chore|refactor|docs)/ ]] ||
          { echo "Branch name must match: feat/, fix/, chore/, refactor/, or docs/"; exit 1; }'
        language: system
        stages: [pre-push]
        always_run: true
        pass_filenames: false

      - id: project-validate
        name: Project validation
        entry: bash scripts/validate.sh
        language: system
        stages: [pre-push]
        always_run: true
        pass_filenames: false
